services:
  kintone:
    build: .
    volumes:
      # ソースコードをマウント（変更が即反映される）
      - .:/app
      # node_modules はコンテナ内のものを使う（パフォーマンス向上）
      - /app/node_modules
      # 新しいアプリを追加したら、以下のように追記:
      # - /app/apps/your-app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    # ホットリロード用
    stdin_open: true
    tty: true
